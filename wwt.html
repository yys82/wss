<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>24级艺术设计一班 · 平时分</title>
    <style>
        /* ===== 全局设计 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "微软雅黑", system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f6f3fc 0%, #e9e4f0 100%);
            min-height: 100vh;
            padding: 30px 16px 60px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 880px;
            width: 100%;
            margin: 0 auto;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 28px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(6px);
            padding: 24px 16px;
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            letter-spacing: 1px;
        }

        .header .sub {
            font-size: 15px;
            color: #666;
            margin-top: 6px;
            letter-spacing: 3px;
            font-weight: 300;
        }

        /* ===== 统计栏 ===== */
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            background: #ffffffd9;
            backdrop-filter: blur(4px);
            padding: 18px 24px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 24px;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .stats .item {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 15px;
            color: #444;
        }

        .stats .item .num {
            font-weight: 700;
            font-size: 22px;
            color: #1a1a2e;
        }

        .stats .item .num.green {
            color: #2ecc71;
        }
        .stats .item .num.red {
            color: #e74c3c;
        }
        .stats .item .num.gray {
            color: #95a5a6;
        }

        /* ===== 搜索框 ===== */
        .search-box {
            position: relative;
            margin-bottom: 22px;
        }

        .search-box input {
            width: 100%;
            padding: 16px 20px 16px 52px;
            border: none;
            border-radius: 18px;
            font-size: 16px;
            outline: none;
            background: #ffffffd9;
            backdrop-filter: blur(4px);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04);
            transition: box-shadow 0.25s, transform 0.1s;
            color: #1a1a2e;
            border: 1px solid transparent;
        }

        .search-box input::placeholder {
            color: #bbb;
        }

        .search-box input:focus {
            box-shadow: 0 8px 28px rgba(106, 17, 203, 0.12);
            border-color: #8e2de2;
            transform: scale(1.005);
        }

        .search-box .icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 22px;
            color: #aaa;
            pointer-events: none;
        }

        /* ===== 学生卡片 ===== */
        .student-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .student-card {
            background: #ffffffdd;
            backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 18px 22px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
            transition: transform 0.2s, box-shadow 0.25s;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            user-select: none;
        }

        .student-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
            border-color: #d5c4f0;
        }

        .student-card .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
        }

        .student-card .name {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-card .name .badge {
            font-size: 12px;
            font-weight: 400;
            background: #ede7f6;
            color: #6a11cb;
            padding: 0 14px;
            border-radius: 30px;
            line-height: 26px;
            letter-spacing: 0.3px;
        }

        .student-card .score {
            font-size: 24px;
            font-weight: 700;
            white-space: nowrap;
        }

        .student-card .score.positive {
            color: #27ae60;
        }
        .student-card .score.negative {
            color: #e74c3c;
        }
        .student-card .score.zero {
            color: #b0b0b0;
        }

        /* ===== 展开明细 ===== */
        .student-card .detail-wrap {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease, opacity 0.3s;
            padding-top: 0;
            opacity: 0;
        }

        .student-card.open .detail-wrap {
            max-height: 1200px;
            padding-top: 20px;
            opacity: 1;
        }

        .student-card .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            border-radius: 16px;
            overflow: hidden;
            background: #faf9fc;
            border: 1px solid #edeaf5;
        }

        .student-card .detail-table th {
            background: #f0ebf9;
            color: #4a3b6b;
            font-weight: 600;
            padding: 12px 14px;
            text-align: left;
            font-size: 13px;
            letter-spacing: 0.5px;
        }

        .student-card .detail-table td {
            padding: 12px 14px;
            border-top: 1px solid #edeaf5;
            color: #333;
            vertical-align: middle;
        }

        .student-card .detail-table .tag {
            display: inline-block;
            padding: 2px 14px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            line-height: 26px;
        }

        .student-card .detail-table .tag.add {
            background: #d5f0e0;
            color: #1e7e34;
        }

        .student-card .detail-table .tag.sub {
            background: #fadada;
            color: #b33c3c;
        }

        .student-card .detail-table .val-add {
            color: #27ae60;
            font-weight: 700;
        }

        .student-card .detail-table .val-sub {
            color: #e74c3c;
            font-weight: 700;
        }

        .student-card .empty-detail {
            color: #bbb;
            font-size: 14px;
            padding: 8px 0 4px;
            font-style: italic;
        }

        /* ===== 加载 / 错误 ===== */
        .loading,
        .error-msg {
            text-align: center;
            padding: 50px 0;
            font-size: 16px;
            color: #888;
        }

        .error-msg {
            color: #c0392b;
        }

        .error-msg span {
            font-size: 40px;
            display: block;
            margin-bottom: 16px;
        }

        .error-msg small {
            color: #999;
            font-size: 14px;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            color: #bbb;
            font-size: 13px;
            margin-top: 32px;
            letter-spacing: 1.5px;
            font-weight: 300;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 16px 12px 40px;
            }
            .header h1 {
                font-size: 24px;
            }
            .stats {
                padding: 14px 18px;
                gap: 8px 12px;
                font-size: 13px;
            }
            .stats .item .num {
                font-size: 18px;
            }
            .student-card {
                padding: 14px 16px;
            }
            .student-card .name {
                font-size: 17px;
            }
            .student-card .score {
                font-size: 20px;
            }
            .student-card .detail-table {
                font-size: 12px;
            }
            .student-card .detail-table th,
            .student-card .detail-table td {
                padding: 8px 10px;
            }
            .search-box input {
                padding: 14px 16px 14px 44px;
                font-size: 15px;
            }
            .search-box .icon {
                left: 16px;
                font-size: 18px;
            }
        }

        @media (max-width: 420px) {
            .stats .item {
                font-size: 12px;
            }
            .stats .item .num {
                font-size: 15px;
            }
            .student-card .name {
                font-size: 15px;
            }
            .student-card .score {
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🎨 24级艺术设计一班</h1>
            <div class="sub">平时分 · 点击卡片展开明细</div>
        </div>

        <!-- 统计栏 -->
        <div class="stats" id="statsBar" style="display:none;">
            <div class="item">👥 总人数 <span class="num" id="totalCount">0</span></div>
            <div class="item">📊 平均分 <span class="num" id="avgScore">0</span></div>
            <div class="item">⬆️ 最高分 <span class="num green" id="maxScore">0</span></div>
            <div class="item">⬇️ 最低分 <span class="num red" id="minScore">0</span></div>
        </div>

        <!-- 搜索 -->
        <div class="search-box" style="display:none;" id="searchBox">
            <span class="icon">🔍</span>
            <input type="text" id="searchInput" placeholder="输入姓名快速筛选…" autocomplete="off" />
        </div>

        <!-- 学生列表 -->
        <div class="student-list" id="studentList">
            <div class="loading">⏳ 正在加载数据…</div>
        </div>

        <div class="footer">— 数据实时同步 · 如有疑问请联系班主任 —</div>
    </div>

    <script>
        // ========================================================
        //  ★ 唯一数据源：同目录下的「平时分数据.json」 ★
        // ========================================================

        const listEl = document.getElementById('studentList');
        const statsBar = document.getElementById('statsBar');
        const searchBox = document.getElementById('searchBox');
        const searchInput = document.getElementById('searchInput');

        // ----- 渲染函数 -----
        function render(data) {
            if (!data || !data.学生 || data.学生.length === 0) {
                listEl.innerHTML = `<div class="error-msg"><span>📭</span>暂无学生数据</div>`;
                return;
            }

            const students = data.学生;

            // 统计
            const total = students.length;
            const scores = students.map(s => s.总分);
            const validScores = scores.filter(v => typeof v === 'number');
            const sum = validScores.reduce((a, b) => a + b, 0);
            const avg = validScores.length ? (sum / validScores.length) : 0;
            const max = validScores.length ? Math.max(...validScores) : 0;
            const min = validScores.length ? Math.min(...validScores) : 0;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('avgScore').textContent = avg.toFixed(1);
            document.getElementById('maxScore').textContent = max;
            document.getElementById('minScore').textContent = min;

            // 显示统计栏和搜索框
            statsBar.style.display = 'flex';
            searchBox.style.display = 'block';

            // ----- 渲染列表（支持搜索过滤） -----
            function renderList(filter = '') {
                const keyword = filter.trim().toLowerCase();
                const filtered = keyword ?
                    students.filter(s => s.姓名.includes(keyword)) :
                    students;

                if (filtered.length === 0) {
                    listEl.innerHTML =
                        `<div class="error-msg"><span>🔎</span>未找到「${filter.trim()}」<br><small>试试其他姓名</small></div>`;
                    return;
                }

                let html = '';
                filtered.forEach((stu) => {
                    const isZero = stu.总分 === 0;
                    const isPos = stu.总分 > 0;
                    const scoreClass = isPos ? 'positive' : (isZero ? 'zero' : 'negative');
                    const scoreSign = isPos ? '+' : '';
                    const hasDetail = stu.明细 && stu.明细.length > 0;

                    // 明细表格
                    let detailHtml = '';
                    if (hasDetail) {
                        let rows = '';
                        stu.明细.forEach(item => {
                            const isAdd = item.类型 === '加分';
                            const valClass = isAdd ? 'val-add' : 'val-sub';
                            const tagClass = isAdd ? 'add' : 'sub';
                            const tagText = isAdd ? '➕ 加分' : '➖ 扣分';
                            const sign = isAdd ? '+' : '';
                            rows += `
                                    <tr>
                                        <td>${item.时间 || '-'}</td>
                                        <td><span class="tag ${tagClass}">${tagText}</span></td>
                                        <td>${item.事件 || '-'}</td>
                                        <td class="${valClass}">${sign}${item.分值 || 0}</td>
                                        <td>${item.备注 || '-'}</td>
                                    </tr>
                                `;
                        });
                        detailHtml = `
                                <div class="detail-wrap">
                                    <table class="detail-table">
                                        <thead>
                                            <tr>
                                                <th>时间</th>
                                                <th>类型</th>
                                                <th>事件</th>
                                                <th>分值</th>
                                                <th>备注</th>
                                            </tr>
                                        </thead>
                                        <tbody>${rows}</tbody>
                                    </table>
                                </div>
                            `;
                    } else {
                        detailHtml = `
                                <div class="detail-wrap">
                                    <div class="empty-detail">暂无记录</div>
                                </div>
                            `;
                    }

                    html += `
                            <div class="student-card">
                                <div class="row">
                                    <span class="name">
                                        ${stu.姓名}
                                        ${hasDetail ? `<span class="badge">📋 ${stu.明细.length}条</span>` : ''}
                                    </span>
                                    <span class="score ${scoreClass}">${scoreSign}${stu.总分}</span>
                                </div>
                                ${detailHtml}
                            </div>
                        `;
                });

                listEl.innerHTML = html;

                // 点击卡片切换展开
                document.querySelectorAll('.student-card').forEach(card => {
                    card.addEventListener('click', function() {
                        this.classList.toggle('open');
                    });
                });
            }

            // 初次渲染全部
            renderList('');

            // 绑定搜索事件
            searchInput.addEventListener('input', function() {
                renderList(this.value);
            });
        }

        // ----- 发起请求 -----
        fetch('平时分数据.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} — 请确认文件存在`);
                }
                return response.json();
            })
            .then(data => {
                render(data);
            })
            .catch(err => {
                listEl.innerHTML = `
                        <div class="error-msg">
                            <span>⚠️</span>
                            数据加载失败<br>
                            <small>${err.message}</small><br><br>
                            💡 确保 <strong>「平时分数据.json」</strong> 与 <strong>「wwt.html」</strong> 在同一目录，<br>
                            并通过 GitHub Pages 或 Live Server 访问（不要用 file:// 协议）。
                        </div>
                    `;
                console.error('Fetch error:', err);
            });
    </script>

</body>
</html>
