<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>24级艺术设计一班 · 平时分查询</title>
    <style>
        /* ===== 全局重置 & 字体 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "PingFang SC", "微软雅黑", system-ui, -apple-system, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            padding: 30px 16px 60px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 820px;
            width: 100%;
            margin: 0 auto;
        }

        /* ===== 头部 ===== */
        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: inline-block;
            padding: 0 4px;
        }

        .header .sub {
            font-size: 14px;
            color: #888;
            margin-top: 6px;
            letter-spacing: 2px;
        }

        /* ===== 统计栏 ===== */
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            background: #fff;
            padding: 16px 24px;
            border-radius: 16px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            margin-bottom: 20px;
            justify-content: space-around;
            align-items: center;
        }

        .stats .item {
            display: flex;
            align-items: baseline;
            gap: 4px;
            font-size: 15px;
            color: #444;
        }

        .stats .item .num {
            font-weight: 700;
            font-size: 20px;
            color: #1a1a2e;
        }

        .stats .item .num.green {
            color: #27ae60;
        }
        .stats .item .num.red {
            color: #e74c3c;
        }
        .stats .item .num.gray {
            color: #888;
        }

        /* ===== 搜索框 ===== */
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }

        .search-box input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            border: 2px solid #e8ecf1;
            border-radius: 14px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.25s, box-shadow 0.25s;
            background: #fff;
            color: #1a1a2e;
        }

        .search-box input::placeholder {
            color: #bbb;
        }

        .search-box input:focus {
            border-color: #8e2de2;
            box-shadow: 0 0 0 4px rgba(142, 45, 226, 0.12);
        }

        .search-box .icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: #bbb;
            pointer-events: none;
        }

        /* ===== 学生卡片列表 ===== */
        .student-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .student-card {
            background: #fff;
            border-radius: 14px;
            padding: 16px 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            transition: transform 0.15s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
            user-select: none;
        }

        .student-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            border-color: #e0d7f0;
        }

        .student-card .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px 12px;
        }

        .student-card .name {
            font-size: 18px;
            font-weight: 600;
            color: #1a1a2e;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .student-card .name .badge {
            font-size: 12px;
            font-weight: 400;
            background: #f0f0f5;
            color: #888;
            padding: 0 10px;
            border-radius: 20px;
            line-height: 22px;
        }

        .student-card .score {
            font-size: 20px;
            font-weight: 700;
            white-space: nowrap;
        }

        .student-card .score.positive {
            color: #27ae60;
        }
        .student-card .score.negative {
            color: #e74c3c;
        }
        .student-card .score.zero {
            color: #aaa;
        }

        /* ===== 明细展开区域 ===== */
        .student-card .detail-wrap {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, padding 0.3s ease;
            padding-top: 0;
        }

        .student-card.open .detail-wrap {
            max-height: 800px;
            padding-top: 16px;
        }

        .student-card .detail-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #f0edf5;
        }

        .student-card .detail-table th {
            background: #f7f5fb;
            color: #555;
            font-weight: 600;
            padding: 10px 12px;
            text-align: left;
            font-size: 13px;
            letter-spacing: 0.3px;
        }

        .student-card .detail-table td {
            padding: 10px 12px;
            border-top: 1px solid #f0edf5;
            color: #333;
            vertical-align: middle;
        }

        .student-card .detail-table .tag {
            display: inline-block;
            padding: 0 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            line-height: 24px;
        }

        .student-card .detail-table .tag.add {
            background: #e8f8ee;
            color: #1e7e34;
        }

        .student-card .detail-table .tag.sub {
            background: #fde8e8;
            color: #b33c3c;
        }

        .student-card .detail-table .val-add {
            color: #27ae60;
            font-weight: 700;
        }

        .student-card .detail-table .val-sub {
            color: #e74c3c;
            font-weight: 700;
        }

        .student-card .empty-detail {
            color: #bbb;
            font-size: 14px;
            padding: 6px 0 2px;
        }

        /* ===== 加载/错误状态 ===== */
        .loading,
        .error-msg {
            text-align: center;
            padding: 40px 0;
            font-size: 16px;
            color: #888;
        }

        .error-msg {
            color: #e74c3c;
        }

        .error-msg span {
            font-size: 32px;
            display: block;
            margin-bottom: 12px;
        }

        /* ===== 底部 ===== */
        .footer {
            text-align: center;
            color: #ccc;
            font-size: 13px;
            margin-top: 30px;
            letter-spacing: 1px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            body {
                padding: 16px 12px 40px;
            }

            .header h1 {
                font-size: 22px;
            }

            .stats {
                padding: 14px 16px;
                gap: 8px 14px;
                font-size: 13px;
                border-radius: 12px;
            }

            .stats .item .num {
                font-size: 17px;
            }

            .student-card {
                padding: 14px 16px;
                border-radius: 12px;
            }

            .student-card .name {
                font-size: 16px;
            }

            .student-card .score {
                font-size: 18px;
            }

            .student-card .detail-table {
                font-size: 13px;
            }

            .student-card .detail-table th,
            .student-card .detail-table td {
                padding: 8px 10px;
            }

            .search-box input {
                padding: 12px 16px 12px 42px;
                font-size: 15px;
            }
            .search-box .icon {
                left: 14px;
                font-size: 18px;
            }
        }

        @media (max-width: 420px) {
            .stats .item {
                font-size: 12px;
            }
            .stats .item .num {
                font-size: 15px;
            }
            .student-card .name {
                font-size: 14px;
            }
            .student-card .score {
                font-size: 16px;
            }
            .student-card .detail-table {
                font-size: 12px;
            }
            .student-card .detail-table th,
            .student-card .detail-table td {
                padding: 6px 8px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>🖌️ 24级艺术设计一班</h1>
            <div class="sub">平时分查询 · 点击卡片查看明细</div>
        </div>

        <!-- 统计栏（初始隐藏，加载后显示） -->
        <div class="stats" id="statsBar" style="display:none;">
            <div class="item">👥 总人数 <span class="num" id="totalCount">0</span></div>
            <div class="item">📊 平均分 <span class="num" id="avgScore">0</span></div>
            <div class="item">⬆️ 最高分 <span class="num green" id="maxScore">0</span></div>
            <div class="item">⬇️ 最低分 <span class="num red" id="minScore">0</span></div>
        </div>

        <!-- 搜索框 -->
        <div class="search-box" style="display:none;" id="searchBox">
            <span class="icon">🔍</span>
            <input type="text" id="searchInput" placeholder="搜索学生姓名…" autocomplete="off" />
        </div>

        <!-- 学生列表 -->
        <div class="student-list" id="studentList">
            <div class="loading">⏳ 正在加载数据…</div>
        </div>

        <div class="footer">— 数据实时更新 · 如有疑问请联系班主任 —</div>
    </div>

    <script>
        // ================================================================
        //  ★ 唯一数据来源：fetch 同目录下的「平时分数据.json」 ★
        //  部署到 GitHub Pages 后会自动使用 HTTPS 协议，无跨域问题。
        // ================================================================

        const listEl = document.getElementById('studentList');
        const statsBar = document.getElementById('statsBar');
        const searchBox = document.getElementById('searchBox');
        const searchInput = document.getElementById('searchInput');

        // ----- 渲染函数（与之前相同，但独立） -----
        function render(data) {
            if (!data || !data.学生 || data.学生.length === 0) {
                listEl.innerHTML = `<div class="error-msg"><span>📭</span>暂无学生数据</div>`;
                return;
            }

            const students = data.学生;

            // 统计
            const total = students.length;
            const scores = students.map(s => s.总分);
            const validScores = scores.filter(v => typeof v === 'number');
            const sum = validScores.reduce((a, b) => a + b, 0);
            const avg = validScores.length ? (sum / validScores.length) : 0;
            const max = validScores.length ? Math.max(...validScores) : 0;
            const min = validScores.length ? Math.min(...validScores) : 0;

            document.getElementById('totalCount').textContent = total;
            document.getElementById('avgScore').textContent = avg.toFixed(1);
            document.getElementById('maxScore').textContent = max;
            document.getElementById('minScore').textContent = min;

            // 显示统计栏和搜索框
            statsBar.style.display = 'flex';
            searchBox.style.display = 'block';

            // ----- 渲染列表函数（支持搜索） -----
            function renderList(filter = '') {
                const keyword = filter.trim().toLowerCase();
                const filtered = keyword ?
                    students.filter(s => s.姓名.includes(keyword)) :
                    students;

                if (filtered.length === 0) {
                    listEl.innerHTML =
                        `<div class="error-msg"><span>🔎</span>未找到「${filter.trim()}」<br><small>试试其他关键词</small></div>`;
                    return;
                }

                let html = '';
                filtered.forEach((stu) => {
                    const isZero = stu.总分 === 0;
                    const isPos = stu.总分 > 0;
                    const scoreClass = isPos ? 'positive' : (isZero ? 'zero' : 'negative');
                    const scoreSign = isPos ? '+' : '';
                    const hasDetail = stu.明细 && stu.明细.length > 0;

                    let detailHtml = '';
                    if (hasDetail) {
                        let rows = '';
                        stu.明细.forEach(item => {
                            const isAdd = item.类型 === '加分';
                            const valClass = isAdd ? 'val-add' : 'val-sub';
                            const tagClass = isAdd ? 'add' : 'sub';
                            const tagText = isAdd ? '➕ 加分' : '➖ 扣分';
                            const sign = isAdd ? '+' : '';
                            rows += `
                                    <tr>
                                        <td>${item.时间 || '-'}</td>
                                        <td><span class="tag ${tagClass}">${tagText}</span></td>
                                        <td>${item.事件 || '-'}</td>
                                        <td class="${valClass}">${sign}${item.分值 || 0}</td>
                                        <td>${item.备注 || '-'}</td>
                                    </tr>
                                `;
                        });
                        detailHtml = `
                                <div class="detail-wrap">
                                    <table class="detail-table">
                                        <thead>
                                            <tr>
                                                <th>时间</th>
                                                <th>类型</th>
                                                <th>事件</th>
                                                <th>分值</th>
                                                <th>备注</th>
                                            </tr>
                                        </thead>
                                        <tbody>${rows}</tbody>
                                    </table>
                                </div>
                            `;
                    } else {
                        detailHtml = `
                                <div class="detail-wrap">
                                    <div class="empty-detail">暂无明细记录</div>
                                </div>
                            `;
                    }

                    html += `
                            <div class="student-card">
                                <div class="row">
                                    <span class="name">
                                        ${stu.姓名}
                                        ${hasDetail ? `<span class="badge">📋 ${stu.明细.length}条</span>` : ''}
                                    </span>
                                    <span class="score ${scoreClass}">${scoreSign}${stu.总分}</span>
                                </div>
                                ${detailHtml}
                            </div>
                        `;
                });

                listEl.innerHTML = html;

                // 点击卡片切换展开
                document.querySelectorAll('.student-card').forEach(card => {
                    card.addEventListener('click', function() {
                        this.classList.toggle('open');
                    });
                });
            }

            // 初始渲染（全部）
            renderList('');

            // 搜索监听
            searchInput.addEventListener('input', function() {
                renderList(this.value);
            });
        }

        // ----- 发起 fetch 请求 -----
        fetch('平时分数据.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status} — 请确认文件存在且路径正确`);
                }
                return response.json();
            })
            .then(data => {
                render(data);
            })
            .catch(err => {
                listEl.innerHTML = `
                        <div class="error-msg">
                            <span>⚠️</span>
                            加载数据失败<br>
                            <small>${err.message}</small><br><br>
                            💡 请确保「平时分数据.json」与「wwt.html」在同一目录下，<br>
                            并已部署到 GitHub Pages 或使用 Live Server 访问。
                        </div>
                    `;
                console.error('Fetch error:', err);
            });
    </script>

</body>
</html>
